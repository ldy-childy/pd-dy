<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Export SVG — SVG 내보내기 프로젝트" />
  <title>Export SVG — PD_DY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* 메인과 공유할 공통 토큰 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --bg-card: #13131a;
      --border: rgba(255,255,255,0.07);
      --text-primary: #f0f0f5;
      --text-secondary: #8888aa;
      --text-muted: #55556a;
      --accent: #a78bfa;
      --accent-2: #60a5fa;
      --font-body: 'Inter', sans-serif;
      --font-display: 'Syne', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.8);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-back {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text-primary); }
    .nav-sep { color: var(--border); font-size: 16px; }
    .nav-current {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* HERO */
    .hero {
      padding: 80px 48px 60px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }
    .project-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(167,139,250,0.1);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .desc {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 560px;
    }

    /* CONTENT AREA */
    .content {
      flex: 1;
      padding: 0 48px 80px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }
    .coming-soon {
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 80px 40px;
      text-align: center;
      color: var(--text-muted);
    }
    .coming-soon .icon { font-size: 48px; margin-bottom: 16px; }
    .coming-soon p { font-size: 15px; font-weight: 500; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 28px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      nav, .hero, .content { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../" class="nav-back">← PD_DY</a>
    <span class="nav-sep">/</span>
    <span class="nav-current">Export SVG</span>
  </nav>

  <section class="hero">
    <div class="project-tag">✦ 프로젝트</div>
    <h1>Export SVG</h1>
    <p class="desc">SVG 내보내기 도구 — 디자인 작업물을 SVG 파일로 손쉽게 변환하고 내보내는 인터페이스입니다.</p>
  </section>

  <main class="content">
    <div class="coming-soon">
      <div class="icon">🚧</div>
      <p>프로젝트 개발 중이에요</p>
    </div>
  </main>

  <footer>© 2026 PD_DY · Export SVG Project</footer>

</body>
</html>
