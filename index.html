<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PD_DY - 다양한 UI/UX 프로젝트 모음" />
  <title>Product Design Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">Product Design Team</div>
      <p class="header-sub">프로젝트 쇼케이스</p>
    </div>
  </header>

  <!-- PROJECT GRID -->
  <main class="main">
    <div class="section-header">
      <h2 class="section-title">Projects</h2>
      <span class="project-count" id="project-count">0 projects</span>
    </div>

    <div class="grid" id="project-grid">

      <!-- 프로젝트 카드 템플릿 — 앞으로 여기에 카드 추가 -->
      <!-- 
        카드 추가 방법:
        <article class="card" onclick="location.href='./프로젝트폴더/index.html'">
          <div class="card-thumb" style="background: linear-gradient(135deg, #색1, #색2);">
            <span class="card-emoji">🎨</span>
          </div>
          <div class="card-body">
            <span class="card-tag">태그</span>
            <h3 class="card-title">프로젝트 이름</h3>
            <p class="card-desc">간단한 설명</p>
          </div>
          <div class="card-footer">
            <span class="card-date">2026.03</span>
            <span class="card-arrow">→</span>
          </div>
        </article>
      -->

      <!-- export_svg 프로젝트 카드 -->
      <article class="card" id="card-export-svg" onclick="location.href='./export_svg/'">
        <div class="card-thumb" style="background: linear-gradient(135deg, #667eea, #764ba2);">
          <span class="card-emoji">✦</span>
        </div>
        <div class="card-body">
          <span class="card-tag">SVG · Tool</span>
          <h3 class="card-title">Export SVG</h3>
          <p class="card-desc">디자인 작업물을 SVG 파일로 손쉽게 변환하고 내보내는 인터페이스</p>
        </div>
        <div class="card-footer">
          <span class="card-date">2026.03</span>
          <span class="card-arrow">→</span>
        </div>
      </article>

      <!-- EMPTY STATE -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✦</div>
        <p>첫 번째 프로젝트가 곧 등장해요</p>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 PD_DY · Built with ☕</p>
  </footer>

  <script>
    // 프로젝트 카드 수 카운트
    const grid = document.getElementById('project-grid');
    const cards = grid.querySelectorAll('.card');
    const countEl = document.getElementById('project-count');
    const emptyState = document.getElementById('empty-state');

    countEl.textContent = `${cards.length} project${cards.length !== 1 ? 's' : ''}`;
    if (cards.length > 0) {
      emptyState.style.display = 'none';
    }

    // 카드 hover 틸트 효과
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width - 0.5) * 10;
        const y = ((e.clientY - rect.top) / rect.height - 0.5) * -10;
        card.style.transform = `perspective(600px) rotateX(${y}deg) rotateY(${x}deg) translateY(-4px)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
      });
    });
  </script>

</body>

</html>
